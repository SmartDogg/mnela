name: mnela-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mnela-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mnela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mnela_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-mnela}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mnela} -d ${POSTGRES_DB:-mnela}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: mnela-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-mnela_dev_redis_change_me}
      - --appendonly
      - 'yes'
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-mnela_dev_redis_change_me}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # api/web/worker/orchestrator/caddy services land in Phase 10
  mcp:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.mcp
    container_name: mnela-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mnela}:${POSTGRES_PASSWORD:-mnela_dev_password_change_me}@postgres:5432/${POSTGRES_DB:-mnela}
      REDIS_URL: redis://redis:6379
      MCP_HTTP_PORT: '3010'
      MNELA_LOG_LEVEL: ${MNELA_LOG_LEVEL:-info}
      NODE_ENV: production
    expose:
      - '3010'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3010/health >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
    name: mnela-postgres-data
  redis-data:
    name: mnela-redis-data
