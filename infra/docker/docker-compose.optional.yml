name: mnela-dev

# Optional services controlled by `profiles`. Bring up explicitly:
#   docker compose -f infra/docker/docker-compose.yml \
#     -f infra/docker/docker-compose.optional.yml \
#     --profile optional up -d whisper
#
# Without `--profile optional`, none of these services start. The api/worker
# stay functional in Dumb Mode for the respective subsystem (e.g. whisper
# absence → audio uploads stay at status='raw').

services:
  whisper:
    profiles: [optional]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.whisper
      args:
        WHISPER_MODEL: ${MNELA_WHISPER_MODEL:-base}
        WHISPER_LANGUAGE: ${MNELA_TRANSCRIPTION_LANGUAGE:-ru}
    image: mnela/whisper:${MNELA_WHISPER_MODEL:-base}
    container_name: mnela-whisper
    restart: unless-stopped
    environment:
      WHISPER_MODEL: ${MNELA_WHISPER_MODEL:-base}
      WHISPER_LANGUAGE: ${MNELA_TRANSCRIPTION_LANGUAGE:-ru}
    expose:
      - '8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/ >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
