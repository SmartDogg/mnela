name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22
  # pnpm version is the single source of truth in package.json's
  # "packageManager" field. pnpm/action-setup@v4 reads it automatically
  # via Corepack; specifying a second `with: version:` here would race
  # the two values (ERR_PNPM_BAD_PM_VERSION).
  POSTGRES_USER: mnela
  POSTGRES_PASSWORD: mnela_ci
  POSTGRES_DB: mnela_test
  REDIS_PASSWORD: mnela_ci_redis
  DATABASE_URL: postgresql://mnela:mnela_ci@localhost:5432/mnela_test?schema=public
  REDIS_URL: redis://default:mnela_ci_redis@localhost:6379

jobs:
  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @mnela/db db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mnela -d mnela_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm --filter @mnela/db db:migrate:deploy

      - name: Test
        run: pnpm test

  docker-build-smoke:
    name: Docker build smoke
    runs-on: ubuntu-latest
    # Cheap PR check: each Dockerfile completes its multi-stage build
    # (no push). Catches Dockerfile bitrot before a release tag has to.
    # ~6-8 minutes total with buildx caching.
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build orchestrator image (with claude CLI)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.orchestrator
          push: false
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,scope=orchestrator,mode=max

      - name: Build tg-bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.tg-bot
          push: false
          cache-from: type=gha,scope=tg-bot
          cache-to: type=gha,scope=tg-bot,mode=max

      - name: Build mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.mcp
          push: false
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,scope=mcp,mode=max
