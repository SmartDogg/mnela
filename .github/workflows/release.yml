name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to push (e.g. v0.1.0 or latest)
        required: true
        type: string

# Permissions: write to GitHub Container Registry under the same owner.
# id-token: write is for OIDC keyless cosign attachments (future Phase 11).
permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: smartdogg/mnela

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: infra/docker/Dockerfile.api
          - app: web
            dockerfile: infra/docker/Dockerfile.web
          - app: worker
            dockerfile: infra/docker/Dockerfile.worker
          - app: orchestrator
            dockerfile: infra/docker/Dockerfile.orchestrator
          - app: tg-bot
            dockerfile: infra/docker/Dockerfile.tg-bot
          - app: mcp
            dockerfile: infra/docker/Dockerfile.mcp

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action gives us :latest + :<semver> + :sha tags
      # automatically. For workflow_dispatch with an explicit tag input,
      # the `images` line + `tags` flavor combine to give just that tag.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.app }}
          cache-to: type=gha,scope=release-${{ matrix.app }},mode=max

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${TAG}$" | head -n1 || true)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "## Mnela ${TAG}"
            echo
            if [[ -n "$PREV" ]]; then
              echo "**Changes since ${PREV}:**"
              echo
              git log --no-merges --pretty='- %s' "${PREV}..${TAG}"
            else
              echo "**First release.**"
            fi
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${TAG}/scripts/install.sh | sudo bash"
            echo '```'
            echo
            echo "Pre-built images on GHCR (multi-arch amd64 + arm64):"
            for app in api web worker orchestrator tg-bot mcp; do
              echo "- \`ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mnela-${app}:${TAG}\`"
            done
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: Mnela ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(steps.notes.outputs.tag, '-') }}
