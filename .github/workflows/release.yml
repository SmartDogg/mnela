name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to push (e.g. v0.1.0 or latest)
        required: true
        type: string

# Permissions: write to GitHub Container Registry under the same owner.
# id-token: write is for OIDC keyless cosign attachments (future Phase 11).
permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: smartdogg/mnela

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: infra/docker/Dockerfile.api
          - app: web
            dockerfile: infra/docker/Dockerfile.web
          - app: worker
            dockerfile: infra/docker/Dockerfile.worker
          - app: orchestrator
            dockerfile: infra/docker/Dockerfile.orchestrator
          - app: tg-bot
            dockerfile: infra/docker/Dockerfile.tg-bot
          - app: mcp
            dockerfile: infra/docker/Dockerfile.mcp

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action gives us :latest + :<semver> + :sha tags
      # automatically. For workflow_dispatch with an explicit tag input,
      # the `images` line + `tags` flavor combine to give just that tag.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.app }}
          cache-to: type=gha,scope=release-${{ matrix.app }},mode=max
